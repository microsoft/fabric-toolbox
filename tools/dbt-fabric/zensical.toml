[project]
site_dir = "docs_build/site"
site_name = "dbt-fabric"
site_description = "Documentation for the dbt adapter for Microsoft Fabric"
site_url = "https://microsoft.github.io/fabric-toolbox/dbt-fabric/"
repo_url = "https://github.com/microsoft/fabric-toolbox"
repo_name = "microsoft/fabric-toolbox"
edit_uri = "edit/main/tools/dbt-fabric/docs/"
copyright = """
dbt and dbt Core are trademarks of dbt Labs, Inc.
Microsoft and Microsoft Fabric are trademarks of the Microsoft Corporation.
This website is not affiliated with dbt Labs or Microsoft.
"""

watch = ["README.md"]

nav = [
  { "Home" = [
    { "Overview" = "index.md" },
    { "Features" = "features.md" },
    { "Contributing" = "contributing.md" },
    { "License" = "license.md" },
  ] },
  { "Installation & configuration" = [
    { "Installing the adapter" = "installation.md" },
    { "Compatibility" = "compatibility.md" },
    { "Configuration" = "configuration.md" },
  ] },
  { "Feature guides" = [
    { "Microsoft Purview integration" = "purview-integration.md" },
    { "Python models" = "python-models.md" },
    { "Lakehouse (Spark SQL)" = "lakehouse.md" },
    { "Warehouse snapshots" = "warehouse-snapshots.md" },
    { "External tables" = "external-tables.md" },
    { "Data clustering" = "cluster-by.md" },
    { "Statistics" = "statistics.md" },
    { "Catalog statistics" = "catalog-stats.md" },
    { "Authentication" = "authentication.md" },
    { "Known limitations" = "limitations.md" },
  ] },
  { "Package support" = [
    { "Overview" = "packages/index.md" },
    { "dbt_artifacts" = "packages/dbt-artifacts.md" },
    { "dbt-audit-helper" = "packages/dbt-audit-helper.md" },
    { "dbt-codegen" = "packages/dbt-codegen.md" },
    { "dbt-date" = "packages/dbt-date.md" },
    { "dbt-expectations" = "packages/dbt-expectations.md" },
    { "dbt-external-tables" = "packages/dbt-external-tables.md" },
    { "dbt-profiler" = "packages/dbt-profiler.md" },
    { "dbt-project-evaluator" = "packages/dbt-project-evaluator.md" },
    { "dbt-utils" = "packages/dbt-utils.md" },
  ] },

]

[project.theme]
custom_dir = "overrides"
language = "en"
features = [
    "content.action.edit",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tooltips",
    "navigation.footer",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.instant.progress",
    "navigation.path",
    "navigation.sections",
    "navigation.tabs",
    "navigation.tabs.sticky",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
    "search.suggest",
]

[project.theme.icon]
logo = "material/receipt"
repo = "fontawesome/brands/github"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "teal"
accent = "light green"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "teal"
accent = "light green"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/microsoft/fabric-toolbox"

[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.arithmatex]
generic = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.snippets]
check_paths = true
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]
