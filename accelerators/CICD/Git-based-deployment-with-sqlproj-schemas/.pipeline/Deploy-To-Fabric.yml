trigger:
  branches:
    include: [dev,test,prod]

parameters:
- name: items_in_scope
  displayName: Enter Fabric items to be deployed
  type: string
  default: '["Notebook","DataPipeline","Lakehouse","SemanticModel","Report","Warehouse","CopyJob"]'

variables:
  - name: target_env
    value: ${{ replace(variables['Build.SourceBranch'], 'refs/heads/', '') }}
  # This variable group is linked to Azure Key Vault and secrets contain tenant id, service principal client id, secret
  - group: Fabric_Deployment_Group_S
  # This variable group contains the workspace names based on naming convention "[branch]WorkspaceName". It also contains the gitFolder to be referenced in the python script.
  - group: Fabric_Deployment_Group_DWFeature_NS
stages:
  - stage: DeployToFabric
    displayName: "Deploy to Fabric Workspace"
    jobs:
      - job: Deployment
        displayName: "Deploy Resources"
        pool:
          name: Azure Pipelines
        steps:
          # Use Python Version 3.12
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.12'
              addToPath: true
            displayName: "Set up Python Environment"
          - task: UseDotNet@2
            inputs:
              packageType: 'sdk'
              version: '8.x'
            displayName: "Set up .NET SDK"
          # Install Dependencies
          - script: |
              python -m pip install --upgrade pip
              pip install fabric-cicd 
            displayName: "Install Fabric CICD Library"
          - task: PythonScript@0
            inputs:
              scriptSource: 'filePath'
              scriptPath: '.deploy/deploy-to-fabric.py'
              arguments: '--aztenantid $(aztenantid) --azclientid $(azclientid) --azspsecret $(azspsecret) --items_in_scope ${{ parameters.items_in_scope }} --target_env $(target_env)'
              #failOnStderr: true 
            displayName: 'Run deployment using fabric-cicd'
          - pwsh: |
              # ============================================================================
              # PHASE 1: BUILD LAKEHOUSE PROJECTS
              # ============================================================================
              # This phase compiles SQL schemas extracted from Fabric lakehouses into 
              # DACPAC (Data-tier Application) files. Key points:
              # - Lakehouses auto-discovered from lakehouse-schema/ folders (no hardcoding)
              # - Dependencies detected via SQL code scanning (regex for [DB].[schema].[object])
              # - Built in topological order to satisfy cross-database references
              # - BuildProjectReferences=false prevents model conflicts with shortcut objects
              # - ArtifactReferences auto-injected by extract script enable resolution
              #
              # WHY DEFENSIVE PRACTICES MATTER (implementation lessons):
              # - SelectNodes() XPath is safer than direct property for NULL handling
              # - RemoveChild() with NULL checks prevent crashes on empty ItemGroups
              # - Relative path calculation with GetRelativePath() ensures cross-platform paths
              # - XML namespace awareness preserves document structure integrity
              # ============================================================================
              function Get-TopoOrder {
                param([hashtable]$Nodes)

                $inDegree = @{}
                $dependents = @{}

                foreach ($name in $Nodes.Keys) {
                  $inDegree[$name] = 0
                  $dependents[$name] = New-Object System.Collections.Generic.List[string]
                }

                foreach ($name in $Nodes.Keys) {
                  foreach ($dep in $Nodes[$name]) {
                    if ($Nodes.ContainsKey($dep)) {
                      $inDegree[$name]++
                      $dependents[$dep].Add($name) | Out-Null
                    }
                  }
                }

                $ready = @($inDegree.GetEnumerator() | Where-Object { $_.Value -eq 0 } | ForEach-Object { $_.Key } | Sort-Object)
                $order = @()

                while ($ready.Count -gt 0) {
                  $current = $ready[0]
                  if ($ready.Count -eq 1) {
                    $ready = @()
                  } else {
                    $ready = $ready[1..($ready.Count - 1)]
                  }

                  $order += $current

                  foreach ($dependent in $dependents[$current]) {
                    $inDegree[$dependent]--
                    if ($inDegree[$dependent] -eq 0) {
                      $ready += $dependent
                      $ready = @($ready | Sort-Object)
                    }
                  }
                }

                if ($order.Count -ne $Nodes.Count) {
                  Write-Host "##[warning]Dependency cycle detected, falling back to alphabetical order"
                  return @($Nodes.Keys | Sort-Object)
                }

                return @($order)
              }

              $lakehouseDacpacRoot = "$(Build.SourcesDirectory)\.deploy\dacpacs\lakehouse"
              New-Item -ItemType Directory -Path $lakehouseDacpacRoot -Force | Out-Null
              
              # Discover all lakehouse SQL projects
              $projectMap = @{}
              Get-ChildItem "$(Build.SourcesDirectory)\lakehouse-schema" -Recurse -Filter "*.sqlproj" | ForEach-Object {
                $projName = [System.IO.Path]::GetFileNameWithoutExtension($_.Name)
                $projectMap[$projName] = $_.FullName
              }

              if ($projectMap.Count -eq 0) {
                Write-Host "##[warning]No Lakehouse .sqlproj files found - skipping Lakehouse build"
                return
              }

              # Auto-detect dependencies by scanning SQL files for cross-database references
              Write-Host "Auto-detecting lakehouse dependencies..."
              $dependencies = @{}
              
              foreach ($projName in $projectMap.Keys) {
                $projPath = $projectMap[$projName]
                $projDir = Split-Path -Parent $projPath
                $referencedDatabases = @{}
                
                # Scan all SQL files in this project
                Get-ChildItem -Path $projDir -Recurse -Filter "*.sql" -ErrorAction SilentlyContinue | ForEach-Object {
                  $content = Get-Content $_.FullName -Raw -ErrorAction SilentlyContinue
                  if (-not $content) { return }
                  
                  # Match [DatabaseName].[schema].[object] patterns
                  $regexMatches = [regex]::Matches($content, '\[([^\]]+)\]\.\[?([^\]\.]+)\]?\.\[?([^\]\.]+)\]?')
                  
                  foreach ($match in $regexMatches) {
                    $dbName = $match.Groups[1].Value
                    # Skip if it's the current database or system databases
                    if ($dbName -ne $projName -and $dbName -notin @("sys", "INFORMATION_SCHEMA", "master", "tempdb", "msdb", "model")) {
                      # Check if this database exists as another SQL project
                      if ($projectMap.ContainsKey($dbName)) {
                        $referencedDatabases[$dbName] = $true
                      }
                    }
                  }
                }
                
                $dependencies[$projName] = @($referencedDatabases.Keys)
                if ($referencedDatabases.Count -gt 0) {
                  Write-Host "  $projName -> $($referencedDatabases.Keys -join ', ')"
                }
              }
              
              # Calculate build order using topological sort
              $buildOrder = Get-TopoOrder -Nodes $dependencies

              foreach ($name in $buildOrder) {
                if (-not $projectMap.ContainsKey($name)) { continue }
                $path = $projectMap[$name]
                Write-Host "Building: $path"
                # Verify ArtifactReference paths resolve before build
                try {
                  [xml]$projXml = Get-Content $path
                  $artifactRefs = $projXml.SelectNodes("//ArtifactReference")
                  if (-not $artifactRefs -or $artifactRefs.Count -eq 0) {
                    Write-Host "##[warning]No ArtifactReference entries found in $path"
                  } else {
                    foreach ($artifactRef in $artifactRefs) {
                      $includePath = $artifactRef.GetAttribute("Include")
                      if ([string]::IsNullOrWhiteSpace($includePath)) { continue }
                      $fullPath = Join-Path (Split-Path -Parent $path) $includePath
                      $resolved = Resolve-Path $fullPath -ErrorAction SilentlyContinue
                      if ($resolved) {
                        Write-Host "  ArtifactReference OK: $includePath -> $resolved"
                      } else {
                        Write-Host "##[warning]ArtifactReference missing: $includePath"
                      }
                    }
                  }
                } catch {
                  Write-Host "##[warning]Failed to read ArtifactReferences from ${path}: $($_.Exception.Message)"
                }
                # Lakehouse projects can include objects that overlap referenced lakehouses (e.g., shortcuts).
                # Build without project references to avoid duplicate model element errors.
                $outputPath = Join-Path $lakehouseDacpacRoot $name
                New-Item -ItemType Directory -Path $outputPath -Force | Out-Null
                dotnet build $path -c Release -p:BuildProjectReferences=false -p:OutputPath=$outputPath
                if ($LASTEXITCODE -ne 0) {
                  throw "Failed to build $name"
                }
              }

              # Ensure every lakehouse project has a DACPAC (including shortcuts)
              $lakehouseProjects = Get-ChildItem "$(Build.SourcesDirectory)\lakehouse-schema" -Recurse -Filter "*.sqlproj" -ErrorAction SilentlyContinue
              $missingDacpacs = @()
              foreach ($proj in $lakehouseProjects) {
                $projName = [System.IO.Path]::GetFileNameWithoutExtension($proj.Name)
                $expectedDacpac = Join-Path $lakehouseDacpacRoot "$projName\$projName.dacpac"
                if (-not (Test-Path $expectedDacpac)) {
                  $missingDacpacs += $projName
                  Write-Host "##[warning]DACPAC missing for $projName. Building fallback DACPAC..."
                  $fallbackOut = Join-Path $lakehouseDacpacRoot $projName
                  New-Item -ItemType Directory -Path $fallbackOut -Force | Out-Null
                  dotnet build $proj.FullName -c Release -p:BuildProjectReferences=false -p:OutputPath=$fallbackOut
                  if ($LASTEXITCODE -ne 0) {
                    throw "Failed to build fallback DACPAC for $projName"
                  }
                }
              }
              if ($missingDacpacs.Count -gt 0) {
                Write-Host "##[warning]Missing lakehouse DACPACs (fallback built): $($missingDacpacs -join ', ')"
              } else {
                Write-Host "All lakehouse DACPACs present."
              }
            displayName: "Build Lakehouse Dacpacs"
          - bash: |
              # Diagnostic step to inspect Lakehouse DACPAC contents using unzip
              # Dynamically discovers all DACPAC files instead of hardcoding names.
              echo "Inspecting Lakehouse DACPAC contents..."
              lakehouseDacpacRoot="$(Build.SourcesDirectory)/.deploy/dacpacs/lakehouse"
              
              # Discover all DACPAC files dynamically
              find "$lakehouseDacpacRoot" -name "*.dacpac" -type f 2>/dev/null | while read dacpac; do
                name=$(basename "$(dirname "$dacpac")")
                if [ ! -f "$dacpac" ]; then
                  echo "✗ DACPAC not found: $dacpac"
                  continue
                fi
                
                echo ""
                echo "=== $name ==="
                echo "DACPAC: $dacpac"
                echo "Size: $(stat -c%s "$dacpac" 2>/dev/null || stat -f%z "$dacpac" 2>/dev/null) bytes"
                echo ""
                echo "Contents:"
                unzip -l "$dacpac"
                
                echo ""
                echo "Extracting and checking metadata..."
                extractPath="$(Build.SourcesDirectory)/.deploy/dacpac-extract-$name"
                rm -rf "$extractPath"
                mkdir -p "$extractPath"
                unzip -q "$dacpac" -d "$extractPath"
                
                # Check for DacMetadata.xml
                if [ -f "$extractPath/DacMetadata.xml" ]; then
                  echo "✓ DacMetadata.xml found"
                  echo "Database Name:"
                  grep -o '<Name>[^<]*</Name>' "$extractPath/DacMetadata.xml" | head -1
                else
                  echo "✗ DacMetadata.xml not found"
                fi
                
                # Check for model.xml (contains object definitions)
                if [ -f "$extractPath/model.xml" ]; then
                  echo "✓ model.xml found (object count: $(grep -c '<Element' "$extractPath/model.xml" 2>/dev/null || echo 'unknown'))"
                else
                  echo "✗ model.xml not found"
                fi
              done
            displayName: "Inspect Lakehouse DACPAC Metadata"
          - pwsh: |
              # Add ArtifactReferences to Warehouse projects to reference built Lakehouse DACPACs
              Write-Host "Adding ArtifactReferences to Warehouse projects..."
              
                $repoRoot = "$(Build.SourcesDirectory)"
                $lakehouseDacpacRoot = "$(Build.SourcesDirectory)\.deploy\dacpacs\lakehouse"
              $lakehouseProjects = @{}
              
              # Find all Lakehouse DACPAC files that were just built
                Get-ChildItem -Path $lakehouseDacpacRoot -Recurse -Filter "*.dacpac" -ErrorAction SilentlyContinue | ForEach-Object {
                  $projName = [System.IO.Path]::GetFileNameWithoutExtension($_.Name)
                  $lakehouseProjects[$projName] = $_.FullName
                  Write-Host "Found Lakehouse DACPAC: $projName at $($_.FullName)"
              }
              
              # Find all Warehouse .sqlproj files and add ArtifactReferences
              Get-ChildItem -Path "$repoRoot\fabric" -Recurse -Filter "*.sqlproj" -ErrorAction SilentlyContinue | ForEach-Object {
                  $projPath = $_.FullName
                  $projName = [System.IO.Path]::GetFileNameWithoutExtension($_.Name)
                  $projDir = $_.DirectoryName
                  Write-Host "Processing Warehouse project: $projName"
                  
                  try {
                    # Read the project file
                    [xml]$projXml = Get-Content $projPath
                    $ns = $projXml.DocumentElement.NamespaceURI
                    
                    foreach ($lakehouseName in $lakehouseProjects.Keys) {
                        $dacpacPath = $lakehouseProjects[$lakehouseName]
                        $relativeDacpacPath = [System.IO.Path]::GetRelativePath($projDir, $dacpacPath).Replace('\', '/')
                        
                        # Check if ArtifactReference already exists (by database variable first, then include match)
                        $existingRef = $projXml.SelectSingleNode("//ArtifactReference[DatabaseVariableLiteralValue='$lakehouseName' or DatabaseSqlCmdVariable='$lakehouseName']", $null)
                        if (-not $existingRef) {
                          $existingRef = $projXml.SelectSingleNode("//ArtifactReference[contains(@Include, '$lakehouseName')]", $null)
                        }

                        if (-not $existingRef) {
                            Write-Host "  Adding ArtifactReference for $lakehouseName"
                            
                            # Find or create ItemGroup for ArtifactReference
                            $itemGroup = $projXml.SelectSingleNode("//ItemGroup[ArtifactReference]", $null)
                            if (-not $itemGroup) {
                                # Create ItemGroup without namespace if document has no namespace
                                if ([string]::IsNullOrEmpty($ns)) {
                                    $itemGroup = $projXml.CreateElement("ItemGroup")
                                } else {
                                    $itemGroup = $projXml.CreateElement("ItemGroup", $ns)
                                }
                                $projXml.DocumentElement.AppendChild($itemGroup) | Out-Null
                            }
                            
                            # Create ArtifactReference element
                            $artifactRef = if ([string]::IsNullOrEmpty($ns)) {
                                $projXml.CreateElement("ArtifactReference")
                            } else {
                                $projXml.CreateElement("ArtifactReference", $ns)
                            }
                            $artifactRef.SetAttribute("Include", $relativeDacpacPath)
                            
                            # Add DatabaseVariableLiteralValue
                            $dbVarLit = if ([string]::IsNullOrEmpty($ns)) {
                                $projXml.CreateElement("DatabaseVariableLiteralValue")
                            } else {
                                $projXml.CreateElement("DatabaseVariableLiteralValue", $ns)
                            }
                            $dbVarLit.InnerText = $lakehouseName
                            $artifactRef.AppendChild($dbVarLit) | Out-Null
                            
                            # Add DatabaseSqlCmdVariable
                            $dbSqlCmd = if ([string]::IsNullOrEmpty($ns)) {
                                $projXml.CreateElement("DatabaseSqlCmdVariable")
                            } else {
                                $projXml.CreateElement("DatabaseSqlCmdVariable", $ns)
                            }
                            $dbSqlCmd.InnerText = $lakehouseName
                            $artifactRef.AppendChild($dbSqlCmd) | Out-Null
                            
                            $itemGroup.AppendChild($artifactRef) | Out-Null
                              Write-Host "    ArtifactReference added for $lakehouseName (DACPAC: $relativeDacpacPath)"
                        } else {
                              Write-Host "  Updating ArtifactReference for $lakehouseName"
                              $existingRef.SetAttribute("Include", $relativeDacpacPath)

                              $existingDbVar = $existingRef.SelectSingleNode("DatabaseVariableLiteralValue", $null)
                              if (-not $existingDbVar) {
                                $existingDbVar = if ([string]::IsNullOrEmpty($ns)) {
                                  $projXml.CreateElement("DatabaseVariableLiteralValue")
                                } else {
                                  $projXml.CreateElement("DatabaseVariableLiteralValue", $ns)
                                }
                                $existingRef.AppendChild($existingDbVar) | Out-Null
                              }
                              $existingDbVar.InnerText = $lakehouseName

                              $existingDbSqlCmd = $existingRef.SelectSingleNode("DatabaseSqlCmdVariable", $null)
                              if (-not $existingDbSqlCmd) {
                                $existingDbSqlCmd = if ([string]::IsNullOrEmpty($ns)) {
                                  $projXml.CreateElement("DatabaseSqlCmdVariable")
                                } else {
                                  $projXml.CreateElement("DatabaseSqlCmdVariable", $ns)
                                }
                                $existingRef.AppendChild($existingDbSqlCmd) | Out-Null
                              }
                              $existingDbSqlCmd.InnerText = $lakehouseName
                              Write-Host "    ArtifactReference updated for $lakehouseName (DACPAC: $relativeDacpacPath)"
                        }
                    }
                    
                    # Save with UTF-8 encoding and proper declaration
                    $settings = New-Object System.Xml.XmlWriterSettings
                    $settings.Indent = $true
                    $settings.Encoding = [System.Text.Encoding]::UTF8
                    $settings.WriteEndDocumentOnClose = $true
                    
                    try {
                      $writer = [System.Xml.XmlWriter]::Create($projPath, $settings)
                      $projXml.Save($writer)  # Use Save() instead of WriteTo() to include XML declaration
                      $writer.Flush()
                      $writer.Dispose()
                    } catch {
                      throw "Failed to save $projPath : $_"
                    }
                    Write-Host "  Saved: $projPath"
                  } catch {
                    throw "Error processing $projPath : $_"
                  }
              }
              Write-Host "ArtifactReferences added successfully"
            displayName: "Add ArtifactReferences to Warehouse Projects"
          - pwsh: |
              # Verify ArtifactReferences were written and DACPACs discovered
              Write-Host "Verifying ArtifactReferences and DACPACs..."
              
              # List all warehouse projects and their ArtifactReferences
              Write-Host "Warehouse projects discovered:"
              Get-ChildItem "$(Build.SourcesDirectory)\fabric" -Recurse -Filter "*.sqlproj" -ErrorAction SilentlyContinue | ForEach-Object {
                $projName = [System.IO.Path]::GetFileNameWithoutExtension($_.Name)
                $content = Get-Content $_.FullName -Raw
                if ($content -match 'ArtifactReference') {
                  Write-Host "  ✓ $projName - contains ArtifactReferences"
                } else {
                  Write-Host "  - $projName - no ArtifactReferences found"
                }
              }
            displayName: "Verify ArtifactReferences"
          - pwsh: |
              # ============================================================================
              # PHASE 2: BUILD WAREHOUSE PROJECTS
              # ============================================================================
              # This phase builds SQL warehouse projects that reference the lakehouse
              # DACPACs created in Phase 1. Key points:
              # - Warehouse projects auto-discovered from fabric/*/Warehouse/ folders
              # - ArtifactReferences auto-added in previous step (~lines 270-340)
              # - BuildProjectReferences=true includes lakehouse references for compilation
              # - TreatUnresolvedReferenceToExternalDatabaseAsError=false allows graceful handling
              # - SuppressTSqlWarnings=71561 ignores resolution warnings on external objects
              # ============================================================================
              # Build Warehouse/fabric projects (depend on Lakehouse projects via ArtifactReference)
              # Use a temp copy for build to avoid modifying repo files while filtering scalar functions.
              $tempRoot = Join-Path "$(Build.SourcesDirectory)" ".deploy\warehouse-build-tmp"
              if (Test-Path $tempRoot) {
                Remove-Item $tempRoot -Recurse -Force -ErrorAction SilentlyContinue
              }
              New-Item -ItemType Directory -Path $tempRoot -Force | Out-Null

              # Copy required folders to preserve relative ArtifactReference paths
              Copy-Item "$(Build.SourcesDirectory)\fabric" (Join-Path $tempRoot "fabric") -Recurse -Force
              if (Test-Path "$(Build.SourcesDirectory)\.deploy\dacpacs\lakehouse") {
                New-Item -ItemType Directory -Path (Join-Path $tempRoot ".deploy\dacpacs") -Force | Out-Null
                Copy-Item "$(Build.SourcesDirectory)\.deploy\dacpacs\lakehouse" (Join-Path $tempRoot ".deploy\dacpacs\lakehouse") -Recurse -Force
              }

              $projects = Get-ChildItem (Join-Path $tempRoot "fabric") -Recurse -Filter "*.sqlproj"
              if ($projects.Count -eq 0) {
                throw "No .sqlproj files found under fabric."
              }

              # Ensure temp build projects reference all lakehouse DACPACs (including shortcuts)
              $tempLakehouseDacpacRoot = Join-Path $tempRoot ".deploy\dacpacs\lakehouse"
              $tempLakehouseDacpacs = @{}
              if (Test-Path $tempLakehouseDacpacRoot) {
                Get-ChildItem -Path $tempLakehouseDacpacRoot -Recurse -Filter "*.dacpac" -ErrorAction SilentlyContinue | ForEach-Object {
                  $name = [System.IO.Path]::GetFileNameWithoutExtension($_.Name)
                  $tempLakehouseDacpacs[$name] = $_.FullName
                }
              }
              Write-Host "Temp lakehouse DACPACs found: $($tempLakehouseDacpacs.Keys -join ', ')"

              foreach ($project in $projects) {
                try {
                  [xml]$projXml = Get-Content $project.FullName
                  $ns = $projXml.DocumentElement.NamespaceURI

                  foreach ($lakehouseName in $tempLakehouseDacpacs.Keys) {
                    $dacpacPath = $tempLakehouseDacpacs[$lakehouseName]
                    $relativeDacpacPath = [System.IO.Path]::GetRelativePath($project.DirectoryName, $dacpacPath).Replace('\\', '/')

                    $existingRef = $projXml.SelectSingleNode("//ArtifactReference[DatabaseVariableLiteralValue='$lakehouseName' or DatabaseSqlCmdVariable='$lakehouseName']", $null)
                    if (-not $existingRef) {
                      $existingRef = $projXml.SelectSingleNode("//ArtifactReference[contains(@Include, '$lakehouseName')]", $null)
                    }

                    if (-not $existingRef) {
                      $itemGroup = $projXml.SelectSingleNode("//ItemGroup[ArtifactReference]", $null)
                      if (-not $itemGroup) {
                        $itemGroup = if ([string]::IsNullOrEmpty($ns)) {
                          $projXml.CreateElement("ItemGroup")
                        } else {
                          $projXml.CreateElement("ItemGroup", $ns)
                        }
                        $projXml.DocumentElement.AppendChild($itemGroup) | Out-Null
                      }

                      $artifactRef = if ([string]::IsNullOrEmpty($ns)) {
                        $projXml.CreateElement("ArtifactReference")
                      } else {
                        $projXml.CreateElement("ArtifactReference", $ns)
                      }
                      $artifactRef.SetAttribute("Include", $relativeDacpacPath)

                      $dbVarLit = if ([string]::IsNullOrEmpty($ns)) {
                        $projXml.CreateElement("DatabaseVariableLiteralValue")
                      } else {
                        $projXml.CreateElement("DatabaseVariableLiteralValue", $ns)
                      }
                      $dbVarLit.InnerText = $lakehouseName
                      $artifactRef.AppendChild($dbVarLit) | Out-Null

                      $dbSqlCmd = if ([string]::IsNullOrEmpty($ns)) {
                        $projXml.CreateElement("DatabaseSqlCmdVariable")
                      } else {
                        $projXml.CreateElement("DatabaseSqlCmdVariable", $ns)
                      }
                      $dbSqlCmd.InnerText = $lakehouseName
                      $artifactRef.AppendChild($dbSqlCmd) | Out-Null

                      $itemGroup.AppendChild($artifactRef) | Out-Null
                      Write-Host "  Added temp ArtifactReference -> $lakehouseName ($relativeDacpacPath)"
                    } else {
                      $existingRef.SetAttribute("Include", $relativeDacpacPath)
                    }
                  }

                  $projXml.Save($project.FullName)
                } catch {
                  throw "Failed to update temp ArtifactReferences for $($project.FullName): $($_.Exception.Message)"
                }
              }

              foreach ($project in $projects) {
                Write-Host "Building: $($project.FullName)"
                # Clean previous build output
                Remove-Item "$($project.DirectoryName)\bin" -Recurse -Force -ErrorAction SilentlyContinue
                Remove-Item "$($project.DirectoryName)\obj" -Recurse -Force -ErrorAction SilentlyContinue

                # Remove scalar functions from temp build copy (Fabric does not support scalar functions)
                $functionsDir = Join-Path $project.DirectoryName "dbo\Functions"
                if (Test-Path $functionsDir) {
                  Get-ChildItem -Path $functionsDir -Recurse -Filter "*.sql" | ForEach-Object {
                    $content = Get-Content $_.FullName -Raw -ErrorAction SilentlyContinue
                    if (-not $content) { return }
                    # Scalar functions: RETURNS <datatype> (not TABLE or @variable TABLE)
                    if ($content -match 'RETURNS\s+(?!TABLE|@)') {
                      Write-Host "  Removing scalar function from temp build: $($_.Name)"
                      Remove-Item $_.FullName -Force -ErrorAction SilentlyContinue
                    }
                  }
                }

                # Build with relaxed validation for external database references
                dotnet build $project.FullName -c Release `
                  -p:BuildProjectReferences=true `
                  -p:TreatWarningsAsErrors=false `
                  -p:TreatUnresolvedReferenceToExternalDatabaseAsError=false `
                  -p:ValidateBindings=false `
                  -p:RunSqlCodeAnalysis=false `
                  -p:SuppressTSqlWarnings=71561 `
                  -p:SuppressWarnings=71561
                if ($LASTEXITCODE -ne 0) {
                  throw "Failed to build $($project.Name)"
                }
              }

              # Copy built warehouse DACPACs from temp build to repo fabric path for publish steps
              $tempDacpacs = Get-ChildItem (Join-Path $tempRoot "fabric") -Recurse -Filter "*.dacpac" -ErrorAction SilentlyContinue
              foreach ($tempDacpac in $tempDacpacs) {
                $trimChars = [char[]]"\\/"
                $relative = $tempDacpac.FullName.Substring((Join-Path $tempRoot "fabric").Length).TrimStart($trimChars)
                $destPath = Join-Path "$(Build.SourcesDirectory)\fabric" $relative
                $destDir = Split-Path -Parent $destPath
                New-Item -ItemType Directory -Path $destDir -Force | Out-Null
                Copy-Item $tempDacpac.FullName -Destination $destPath -Force
                Write-Host "  Copied DACPAC -> $destPath"
              }
            displayName: "Build Warehouse Dacpac"
          - bash: |
              # Diagnostic step to inspect Warehouse DACPAC contents
              # Dynamically discovers warehouse DACPACs instead of hardcoding "DemoWarehouse"
              echo "Inspecting Warehouse DACPAC contents..."
              
              # Find first warehouse DACPAC (under fabric/*/bin/Release/)
              dacpac=$(find "$(Build.SourcesDirectory)/fabric" -name "*.dacpac" -type f | grep -v "lakehouse-schema" | head -1)
              
              if [ -z "$dacpac" ]; then
                echo "✗ DACPAC not found"
                exit 0
              fi
              
              echo "Found DACPAC: $dacpac"
              echo "Size: $(stat -c%s "$dacpac" 2>/dev/null || stat -f%z "$dacpac" 2>/dev/null) bytes"
              echo ""
              echo "=== DACPAC Contents ==="
              unzip -l "$dacpac"
              
              echo ""
              echo "=== Extracting and analyzing schema ==="
              extractPath="$(Build.SourcesDirectory)/.deploy/warehouse-dacpac-extract"
              rm -rf "$extractPath"
              mkdir -p "$extractPath"
              unzip -q "$dacpac" -d "$extractPath"
              
              echo "Files in DACPAC:"
              find "$extractPath" -type f | sort
              
              echo ""
              # Generic model.xml inspection (works for any warehouse)
              if [ -f "$extractPath/model.xml" ]; then
                echo "✓ model.xml found"
                echo ""
                echo "Schema objects in warehouse (generic inspection):"
                echo "  Tables/Views: $(grep -c 'Table\|View' "$extractPath/model.xml" 2>/dev/null || echo 'N/A')"
                echo "  Procedures: $(grep -c 'Procedure' "$extractPath/model.xml" 2>/dev/null || echo 'N/A')"
                echo ""
                echo "Lakehouse references detected:"
                grep -io 'Lakehouse' "$extractPath/model.xml" | sort -u || echo "(none found)"
              else
                echo "✗ model.xml not found"
              fi
            displayName: "Inspect Warehouse DACPAC Contents"
          - pwsh: |
              dotnet tool install -g microsoft.sqlpackage
              $toolPath = "$env:USERPROFILE\.dotnet\tools"
              Write-Host "##vso[task.prependpath]$toolPath"
            displayName: "Install SqlPackage"
          - pwsh: |
              $dacpac = Get-ChildItem "$(Build.SourcesDirectory)\fabric" -Recurse -Filter "*.dacpac" | Select-Object -First 1
              if (-not $dacpac) {
                throw "DACPAC not found under fabric."
              }
              
              # Build the reference paths for lakehouse DACPACs
              $lakehouseDacpacDir = "$(Build.SourcesDirectory)\.deploy\dacpacs\lakehouse"
              $referencePaths = @()
              if (Test-Path $lakehouseDacpacDir) {
                Get-ChildItem -Path $lakehouseDacpacDir -Recurse -Filter "*.dacpac" | ForEach-Object {
                  $referencePaths += $_.DirectoryName
                }
              }
              $referencePathsArg = if ($referencePaths) { "/ReferencePaths:`"$($referencePaths -join ';')`"" } else { "" }
              
              $diagDir = "$(Build.SourcesDirectory)\.deploy\logs"
              New-Item -ItemType Directory -Path $diagDir -Force | Out-Null
              $diagFile = Join-Path $diagDir "sqlpackage_warehouse_diagnostics.xml"
              $conn = "Server=tcp:$(FABRIC_WAREHOUSE_SERVER),1433;Database=$(FABRIC_WAREHOUSE_NAME);Authentication=Active Directory Service Principal;User Id=$(azclientid);Password=$(azspsecret);Encrypt=True;TrustServerCertificate=False;"
              
              Write-Host "Publishing with reference paths: $referencePathsArg"
              $cmd = "sqlpackage /Action:Publish /SourceFile:`"$dacpac`" /TargetConnectionString:`"$conn`" /p:BlockOnPossibleDataLoss=false /p:DropObjectsNotInSource=true /DiagnosticsFile:`"$diagFile`" $referencePathsArg"
              Write-Host "Command: $cmd"
              Invoke-Expression $cmd
            displayName: "Publish Warehouse Schema"
          - pwsh: |
              # Publish Lakehouse schemas from built DACPACs in lakehouse-schema folder
              if ($env:FABRIC_SQL_ENDPOINTS_TARGET) {
                $sqlEndpoints = $env:FABRIC_SQL_ENDPOINTS_TARGET | ConvertFrom-Json
                $lakehouseSchemaDir = "$(Build.SourcesDirectory)\lakehouse-schema"
                $lakehouseDacpacRoot = "$(Build.SourcesDirectory)\.deploy\dacpacs\lakehouse"
                $manifestPath = Join-Path $lakehouseSchemaDir "dependency-manifest.json"
                $diagDir = "$(Build.SourcesDirectory)\.deploy\logs"
                New-Item -ItemType Directory -Path $diagDir -Force | Out-Null

                function Get-TopoOrder {
                  param([hashtable]$Nodes)

                  $inDegree = @{}
                  $dependents = @{}

                  foreach ($name in $Nodes.Keys) {
                    $inDegree[$name] = 0
                    $dependents[$name] = New-Object System.Collections.Generic.List[string]
                  }

                  foreach ($name in $Nodes.Keys) {
                    foreach ($dep in $Nodes[$name]) {
                      if ($Nodes.ContainsKey($dep)) {
                        $inDegree[$name]++
                        $dependents[$dep].Add($name) | Out-Null
                      }
                    }
                  }

                  $ready = @($inDegree.GetEnumerator() | Where-Object { $_.Value -eq 0 } | ForEach-Object { $_.Key } | Sort-Object)
                  $order = @()

                  while ($ready.Count -gt 0) {
                    $current = $ready[0]
                    if ($ready.Count -eq 1) {
                      $ready = @()
                    } else {
                      $ready = $ready[1..($ready.Count - 1)]
                    }

                    $order += $current

                    foreach ($dependent in $dependents[$current]) {
                      $inDegree[$dependent]--
                      if ($inDegree[$dependent] -eq 0) {
                        $ready += $dependent
                        $ready = @($ready | Sort-Object)
                      }
                    }
                  }

                  if ($order.Count -ne $Nodes.Count) {
                    Write-Host "##[warning]Dependency cycle detected, falling back to alphabetical order"
                    return @($Nodes.Keys | Sort-Object)
                  }

                  return @($order)
                }

                $endpointsByName = @{}
                foreach ($endpoint in $sqlEndpoints) {
                  $endpointsByName[$endpoint.displayName] = $endpoint
                }

                $orderedNames = @()
                if (Test-Path $manifestPath) {
                  $manifest = Get-Content $manifestPath -Raw | ConvertFrom-Json
                  $nodes = @{}
                  foreach ($item in $manifest) {
                    if ($item.type -eq "lakehouse") {
                      $nodes[$item.name] = @($item.references)
                    }
                  }
                  if ($nodes.Count -gt 0) {
                    $orderedNames = Get-TopoOrder -Nodes $nodes
                  }
                } else {
                  Write-Host "##[warning]Dependency manifest not found - using endpoint order"
                }

                $remaining = $endpointsByName.Keys | Where-Object { $orderedNames -notcontains $_ } | Sort-Object
                $publishOrder = @($orderedNames + $remaining)
                
                foreach ($lakehouseName in $publishOrder) {
                  if (-not $endpointsByName.ContainsKey($lakehouseName)) { continue }
                  $endpoint = $endpointsByName[$lakehouseName]
                  # Find DACPAC in centralized lakehouse DACPAC output
                  $dacpacFile = Get-ChildItem -Path "$lakehouseDacpacRoot\$lakehouseName" -Recurse -Filter "*.dacpac" | Select-Object -First 1
                  
                  if ($dacpacFile) {
                    Write-Host "Publishing $($dacpacFile.FullName) to $lakehouseName"
                    $targetConn = "Server=tcp:$($endpoint.connectionString),1433;Database=$lakehouseName;Authentication=Active Directory Service Principal;User Id=$(azclientid);Password=$(azspsecret);Encrypt=True;TrustServerCertificate=False;"
                    $diagFile = Join-Path $diagDir "sqlpackage_lakehouse_${lakehouseName}_diagnostics.xml"
                    sqlpackage /Action:Publish /SourceFile:"$($dacpacFile.FullName)" /TargetConnectionString:"$targetConn" /p:ExcludeObjectTypes="Tables" /p:DropObjectsNotInSource=true /DiagnosticsFile:"$diagFile"
                  } else {
                    Write-Host "##[warning]No DACPAC found for $lakehouseName in $lakehouseSchemaDir"
                  }
                }
              } else {
                Write-Host "##[warning]No target SQL endpoints configured - skipping Lakehouse deployment"
              }
            displayName: "Publish Lakehouse SQL Schemas"